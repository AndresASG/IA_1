<div class="flex flex-col h-[600px] w-full max-w-lg mx-auto mt-10 border border-gray-200 rounded-2xl bg-white shadow-lg overflow-hidden">
  
  <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-4 text-white flex items-center justify-between">
    <div>
      <h2 class="text-lg font-bold">Asistente IA</h2>
      <p class="text-xs text-blue-100">Desarrollado con Gemini 2.5 Flash</p>
    </div>
    <span class="flex h-3 w-3 relative">
      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
      <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
    </span>
  </div>

  <div class="flex-1 p-4 overflow-y-auto space-y-4 bg-gray-50">
    <div *ngFor="let msg of messages" 
         [ngClass]="{'justify-end': msg.sender === 'user', 'justify-start': msg.sender === 'bot'}" 
         class="flex">
      
      <div [ngClass]="{
             'bg-blue-600 text-white rounded-br-none': msg.sender === 'user',
             'bg-white text-gray-800 border border-gray-200 rounded-bl-none': msg.sender === 'bot'
           }" 
           class="max-w-[75%] p-3 rounded-2xl shadow-sm break-words">
        <p class="text-sm whitespace-pre-line">{{ msg.text }}</p>
        <span class="text-[10px] block mt-1 text-right opacity-60">
          {{ msg.timestamp | date:'shortTime' }}
        </span>
      </div>

    </div>

    <div *ngIf="isLoading" class="flex justify-start">
      <div class="bg-white border border-gray-200 p-3 rounded-2xl rounded-bl-none shadow-sm flex items-center space-x-1">
        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0ms"></div>
        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 150ms"></div>
        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 300ms"></div>
      </div>
    </div>
  </div>

  <div class="p-3 bg-white border-t border-gray-100 flex items-center space-x-2">
    <input type="text" 
           [(ngModel)]="userInput"
           (keyup.enter)="send()"
           [disabled]="isLoading"
           placeholder="Escribe un mensaje..." 
           class="flex-1 px-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-gray-100 transition" />
    
    <button (click)="send()"
            [disabled]="isLoading || !userInput.trim()"
            class="bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 text-white p-2.5 rounded-xl transition shadow-md flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9-7-9-7v14z" />
      </svg>
    </button>
  </div>

</div>
